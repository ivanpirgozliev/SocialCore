<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SocialCore Saved Posts - Your bookmarked posts.">
  <title>Saved Posts - SocialCore</title>

  <link rel="icon" type="image/svg+xml" href="../images/logo.svg">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../css/feed.css" rel="stylesheet">
  <link href="../css/saved-posts.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
      <a class="navbar-brand" href="../index.html">
        <img src="../images/logo.svg" alt="SocialCore Logo" height="40">
        SocialCore
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <form class="d-flex me-auto" role="search">
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0">
              <i class="bi bi-search text-muted"></i>
            </span>
            <input class="form-control border-start-0" type="search" placeholder="Search..." aria-label="Search">
          </div>
        </form>

        <div class="d-flex align-items-center me-3 gap-2">
          <div class="dropdown">
            <button class="btn btn-link text-muted position-relative p-2" type="button" data-bs-toggle="dropdown" id="messagesToggle">
              <i class="bi bi-chat-dots fs-5"></i>
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="messagesBadge">0</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" style="width: 300px;" id="messagesMenu">
              <li class="dropdown-header">Messages</li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item py-2 text-center text-muted">No new messages</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item text-center text-primary" href="messages.html" data-action="open-messaging">See all messages</a></li>
            </ul>
          </div>

          <div class="dropdown">
            <button class="btn btn-link text-muted position-relative p-2" type="button" data-bs-toggle="dropdown">
              <i class="bi bi-bell fs-5"></i>
              <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none" id="notificationsBadge">0</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end" style="width: 320px;" id="notificationsMenu">
              <li class="dropdown-header">Notifications</li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item py-2 text-center text-muted">Loading...</a></li>
            </ul>
          </div>
        </div>

        <div class="dropdown">
          <button class="btn btn-link text-decoration-none dropdown-toggle" type="button"
                  id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
            <img src="https://ui-avatars.com/api/?name=User&background=3B82F6&color=fff" alt="Profile" class="navbar-avatar js-navbar-avatar" width="35" height="35" loading="lazy">
          </button>
          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
            <li><a class="dropdown-item" href="settings.html"><i class="bi bi-gear me-2"></i>Settings</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="login.html"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <main class="py-4" style="background-color: #cfd5dc;">
    <div class="container">
      <div class="row g-4">
        <div class="col-lg-3 d-none d-lg-block">
          <div class="sidebar">
            <div class="sidebar-card text-center">
              <img
                id="savedPostsSidebarUserAvatar"
                src="https://ui-avatars.com/api/?name=User&background=3B82F6&color=fff&size=80"
                alt="Profile"
                class="rounded-circle mb-3"
                width="80"
                height="80"
                loading="lazy"
              >
              <h6 class="mb-1" id="savedPostsSidebarUserName">User</h6>
              <p class="text-muted small mb-3" id="savedPostsSidebarUserUsername">@user</p>
              <a href="profile.html" class="btn btn-outline-primary btn-sm w-100 sidebar-profile-btn">View Profile</a>
            </div>

            <div class="sidebar-card">
              <ul class="list-unstyled mb-0">
                <li class="mb-2">
                  <a href="feed.html" class="d-flex align-items-center text-decoration-none text-muted">
                    <i class="bi bi-house-door me-2"></i>Feed
                  </a>
                </li>
                <li class="mb-2">
                  <a href="friends.html" class="d-flex align-items-center text-decoration-none text-muted">
                    <i class="bi bi-people me-2"></i>Friends
                  </a>
                </li>
                <li class="mb-2">
                  <a href="saved-posts.html" class="d-flex align-items-center text-decoration-none text-primary fw-semibold">
                    <i class="bi bi-bookmark-check me-2"></i>Saved Posts
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>

        <div class="col-lg-9">
          <section class="card mb-4 saved-posts-header-card">
            <div class="card-body d-flex flex-wrap align-items-center justify-content-between gap-2">
              <div>
                <h4 class="mb-1"><i class="bi bi-bookmark-check me-2"></i>Saved Posts</h4>
                <p class="text-muted mb-0">Posts you bookmarked from your feed and profile pages.</p>
              </div>
            </div>
          </section>

          <section id="savedPostsFeed" class="saved-posts-feed">
            <div class="card text-center py-5">
              <div class="card-body">
                <i class="bi bi-bookmark fs-1 text-muted mb-3 d-block"></i>
                <h5 class="text-muted">Loading saved posts...</h5>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="../js/saved-posts.js"></script>
</body>
</html>
